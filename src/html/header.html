<header class="header">
    <div class="header__body">
        <div class="header__animate">
            <a href="/" class="header__logo header__animate-item">
                <img src="@img/logo.svg" alt="">
            </a>
        </div>

        <div class="header__animate">
            <button class="_btn header__animate-item" data-popup="brief">
                <span><span class="_desktop">Заполнить</span> бриф</span>
                <svg width="10" height="10" viewBox="0 0 10 10">
                    <use xlink:href='img/svg/icons.svg#plus' />
                </svg>
            </button>
        </div>
        <div class="header__animate">
            <button class="_btn header__animate-item" data-popup="services">
                <span>Услуги</span>
                <svg width="10" height="10" viewBox="0 0 10 10">
                    <use xlink:href='img/svg/icons.svg#plus' />
                </svg>
            </button>
        </div>
        <div class="header__animate">
            <button class="_btn header__animate-item" data-popup="about">
                <span>О нас</span>
                <svg width="10" height="10" viewBox="0 0 10 10">
                    <use xlink:href='img/svg/icons.svg#plus' />
                </svg>
            </button>
        </div>
        <div class="header__animate">
            <a href="" target="_blank" class="_btn social header__animate-item">
                <span>Связаться с нами</span>
                <svg width="15" height="13" viewBox="0 0 15 13">
                    <use xlink:href='img/svg/icons.svg#tg' />
                </svg>
            </a>
        </div>
        <div class="header__animate">
            <h1 class="header__animate-item">Дизайн, разработка, <br> продвижение и поддержка сайтов</h1>
        </div>
    </div>
</header>
